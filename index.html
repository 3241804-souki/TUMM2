<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Simple Piano Keyboard</title>
<link rel="icon" href="TUMM2.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
  body{background:#f4f4f4;color:#222;padding:16px}
  .container{max-width:900px;margin:0 auto;text-align:center}
  .logo{width:72px;height:72px;object-fit:cover;border-radius:10px;margin:10px auto}
  h1{margin:8px 0 12px;font-size:20px}
  .controls{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .control-box{background:#fff;padding:8px;border-radius:8px}
  select,input[type=range]{margin-left:8px}
  .piano{position:relative;margin:20px auto;width:600px;height:240px;user-select:none}
  .white-keys{display:flex;height:100%}
  .key{flex:1;border:1px solid #333;background:#fff;position:relative;border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;cursor:pointer}
  .key.black{width:40%;height:60%;background:#111;color:#fff;position:absolute;z-index:2;border-radius:4px;box-shadow:0 4px 6px rgba(0,0,0,0.5)}
  .key-label{font-size:12px;opacity:0.9}
  .key.active{transform:translateY(4px);opacity:0.85}
  /* black key positions */
  .bk-1{left:70px} /* between C and D */
  .bk-2{left:165px} /* between D and E */
  .bk-3{left:325px} /* between F and G */
  .bk-4{left:420px} /* between G and A */
  .bk-5{left:515px} /* between A and B */
  .info{font-size:13px;margin-top:10px}
  @media(max-width:640px){
    .piano{width:340px;height:160px}
    .bk-1{left:40px}.bk-2{left:95px}.bk-3{left:185px}.bk-4{left:240px}.bk-5{left:295px}
  }
</style>
</head>
<body>
  <div class="container">
    <img src="TUMM2.png" class="logo" alt="logo">
    <h1>Simple Piano Keyboard</h1>

    <div class="controls">
      <div class="control-box">Instrument
        <select id="instrument">
          <option value="piano">Piano</option>
          <option value="electric">Electric</option>
          <option value="organ">Organ</option>
          <option value="strings">Strings</option>
        </select>
      </div>
      <div class="control-box">Volume
        <input id="volume" type="range" min="0" max="100" value="60">
      </div>
    </div>

    <div class="piano" id="piano">
      <div class="white-keys" id="whiteKeys">
        <!-- white keys created by script -->
      </div>
      <!-- black keys -->
      <div id="blackKeys">
        <!-- created by script -->
      </div>
    </div>

    <div class="info">
      White keys: A S D F G H J  •  Black keys: W E T Y U<br>
      Press a mapped computer key or click a key to play.
    </div>
  </div>

<script>
  // Simple one-octave keyboard: C4..B4
  const whiteNotes = ['C4','D4','E4','F4','G4','A4','B4'];
  const blackNotes = [
    {note:'C#4', leftClass:'bk-1', key:'w'},
    {note:'D#4', leftClass:'bk-2', key:'e'},
    {note:'F#4', leftClass:'bk-3', key:'t'},
    {note:'G#4', leftClass:'bk-4', key:'y'},
    {note:'A#4', leftClass:'bk-5', key:'u'}
  ];

  // keyboard mapping: white A S D F G H J ; black W E T Y U
  const keyMap = {
    'a':'C4','s':'D4','d':'E4','f':'F4','g':'G4','h':'A4','j':'B4',
    'w':'C#4','e':'D#4','t':'F#4','y':'G#4','u':'A#4'
  };

  // build frequency map A4=440
  const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const frequencies = {};
  for(let octave=0; octave<=8; octave++){
    for(let i=0;i<12;i++){
      const name = names[i]+octave;
      const index = octave*12 + i;
      const a4 = 4*12 + 9;
      frequencies[name] = 440 * Math.pow(2, (index - a4)/12);
    }
  }

  const audioContext = (window.AudioContext || window.webkitAudioContext) ? new (window.AudioContext || window.webkitAudioContext)() : null;
  function createOsc(type,freq,gain){ const osc = audioContext.createOscillator(); osc.type=type; osc.frequency.value=freq; osc.connect(gain); osc.start(); return osc; }
  function playSound(note, duration=0.6){
    if(!audioContext) return;
    const inst = document.getElementById('instrument').value;
    const gain = audioContext.createGain();
    gain.gain.value = document.getElementById('volume').value/100;
    gain.connect(audioContext.destination);
    const list=[];
    const freq = frequencies[note] || 440;
    if(inst==='piano') list.push(createOsc('sine',freq,gain));
    if(inst==='electric') list.push(createOsc('triangle',freq,gain));
    if(inst==='organ'){ list.push(createOsc('square',freq,gain)); list.push(createOsc('square',freq*2,gain)); }
    if(inst==='strings'){ list.push(createOsc('sawtooth',freq,gain)); list.push(createOsc('triangle',freq/2,gain)); }
    gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
    list.forEach(o => o.stop(audioContext.currentTime + duration));
  }

  // create visual white keys
  const whiteKeysDiv = document.getElementById('whiteKeys');
  const blackKeysDiv = document.getElementById('blackKeys');

  whiteNotes.forEach((note,i)=>{
    const el = document.createElement('div');
    el.className = 'key white';
    el.dataset.note = note;
    el.innerHTML = '<div class="key-label">'+note+'<br><small>'+['A','S','D','F','G','H','J'][i]+'</small></div>';
    el.addEventListener('mousedown', ()=>{
      playSound(note);
      el.classList.add('active');
      setTimeout(()=>el.classList.remove('active'),120);
    });
    whiteKeysDiv.appendChild(el);
  });

  // place black keys absolute with classes for left offset
  blackNotes.forEach(b=>{
    const el = document.createElement('div');
    el.className = 'key black ' + b.leftClass;
    el.dataset.note = b.note;
    el.innerHTML = '<div class="key-label">'+b.note+'<br><small>'+b.key.toUpperCase()+'</small></div>';
    el.addEventListener('mousedown', ()=>{
      playSound(b.note);
      el.classList.add('active');
      setTimeout(()=>el.classList.remove('active'),120);
    });
    blackKeysDiv.appendChild(el);
  });

  // keyboard events
  const keysDown = {};
  function findKeyEl(note){
    return document.querySelector('.key[data-note="'+note+'"]');
  }
  window.addEventListener('keydown', (e)=>{
    const k = e.key.toLowerCase();
    if(!keyMap[k]) return;
    if(keysDown[k]) return;
    keysDown[k]=true;
    const note = keyMap[k];
    playSound(note, 0.6);
    const el = findKeyEl(note);
    if(el) el.classList.add('active');
  });
  window.addEventListener('keyup', (e)=>{
    const k = e.key.toLowerCase();
    if(!keyMap[k]) return;
    keysDown[k]=false;
    const note = keyMap[k];
    const el = findKeyEl(note);
    if(el) el.classList.remove('active');
  });

  // prevent scroll for space/arrows
  window.addEventListener('keydown', function(e){
    if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
</script>
</body>
</html>
