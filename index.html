<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Piano Music Maker - One Octave</title>
<link rel="icon" href="TUMM2.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4;padding:15px;color:#222}
.container{max-width:1000px;margin:auto}
header{text-align:center;margin-bottom:20px}
.logo{width:80px;height:80px;object-fit:cover;border-radius:12px;margin-bottom:10px}
.banner{width:100%;max-height:120px;object-fit:contain;border-radius:8px;margin-bottom:15px}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px}
button,select{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.play-btn{background:#4caf50;color:white}
.stop-btn{background:#f44336;color:white}
.clear-btn{background:#2196f3;color:white}
.control-box{background:white;padding:10px;border-radius:8px}
.piano-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative;user-select:none}
.white-keys{display:flex;gap:2px}
.key{display:flex;justify-content:center;align-items:flex-end;padding-bottom:10px;border:1px solid #333;font-size:12px;font-weight:bold;cursor:pointer}
.white{width:80px;height:240px;background:white;color:black;border-radius:6px 6px 6px 6px;position:relative;z-index:1}
.black{width:52px;height:150px;background:black;color:white;position:absolute;z-index:2;border-radius:4px;box-shadow:0 4px 6px rgba(0,0,0,0.4)}
.key-label{font-size:12px;margin-bottom:8px;opacity:0.9}
.key.active{transform:translateY(4px);opacity:0.85}
.black.active{transform:translateY(6px)}
.keys-row{position:relative;padding:0 10px}
.info{text-align:center;margin-top:10px;font-size:14px}
</style>
</head>
<body>
<div class="container">
<header>
<img src="TUMM2.png" class="logo" alt="logo">
<img src="TUMM2.png" class="banner" alt="banner">
<h1>Advanced Piano Music Maker — One Octave</h1>
<p>Use your computer keyboard to play notes. White keys: A S D F G H J. Black keys: W E T Y U.</p>
</header>

<div class="controls">
<button id="playBtn" class="play-btn">▶ Play</button>
<button id="stopBtn" class="stop-btn">■ Stop</button>
<button id="clearBtn" class="clear-btn">Clear</button>

<div class="control-box">
Volume
<input type="range" id="volume" min="0" max="100" value="50">
</div>

<div class="control-box">
Instrument
<select id="instrument">
<option value="piano">Piano</option>
<option value="electric">Electric Piano</option>
<option value="organ">Organ</option>
<option value="strings">Strings</option>
</select>
</div>
</div>

<div class="piano-wrap">
  <div class="keys-row">
    <div class="white-keys" id="whiteKeys">
      <!-- white keys created by script -->
    </div>
    <!-- black keys are positioned absolutely over whites -->
    <!-- black keys container -->
    <div id="blackKeysContainer"></div>
  </div>
</div>

<div class="info">
Tip: press and hold a mapped computer key. The sound lasts 0.6s. Change instrument or volume above.
</div>
</div>

<script>
/*
 One octave only: C4 to B4 (white notes: C D E F G A B)
 White key mapping: A S D F G H J -> C4 D4 E4 F4 G4 A4 B4
 Black key mapping: W E  T Y U -> C#4 D#4  F#4 G#4 A#4
 The layout follows a real piano:
  White order: C  D  E  F  G  A  B
  Black positions: between C-D (C#), D-E (D#), *no black between E-F*, F-G (F#), G-A (G#), A-B (A#)
*/

// Notes array (one octave)
const whiteNotes = ['C4','D4','E4','F4','G4','A4','B4'];
const blackNotes = [
  {note:'C#4', positionIndex:0, key:'w'},
  {note:'D#4', positionIndex:1, key:'e'},
  // skip between E-F (no black)
  {note:'F#4', positionIndex:3, key:'t'},
  {note:'G#4', positionIndex:4, key:'y'},
  {note:'A#4', positionIndex:5, key:'u'}
];

// Keyboard mapping
const keyMap = {
  // white keys
  'a':'C4','s':'D4','d':'E4','f':'F4','g':'G4','h':'A4','j':'B4',
  // black keys
  'w':'C#4','e':'D#4','t':'F#4','y':'G#4','u':'A#4'
};

const audioContext = (window.AudioContext || window.webkitAudioContext) ? new (window.AudioContext || window.webkitAudioContext)() : null;
const frequencies = {};
// build frequencies map (simple calculation using A4 = 440)
(function buildFreq(){
  const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  for(let octave=0; octave<=8; octave++){
    for(let i=0;i<12;i++){
      const name = names[i] + octave;
      const index = octave*12 + i;
      const a4Index = 4*12 + 9; // A4 is index
      frequencies[name] = 440 * Math.pow(2, (index - a4Index)/12);
    }
  }
})();

function createOsc(type,freq,gainNode){
  const osc = audioContext.createOscillator();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gainNode);
  osc.start();
  return osc;
}

function playSound(note, duration = 0.6){
  if(!audioContext) return;
  const instrument = document.getElementById('instrument').value;
  const gainNode = audioContext.createGain();
  const vol = document.getElementById('volume').value;
  gainNode.gain.value = vol/100;
  gainNode.connect(audioContext.destination);

  const list = [];
  const freq = frequencies[note] || 440;
  if(instrument === 'piano'){
    list.push(createOsc('sine', freq, gainNode));
  } else if(instrument === 'electric'){
    list.push(createOsc('triangle', freq, gainNode));
  } else if(instrument === 'organ'){
    list.push(createOsc('square', freq, gainNode));
    list.push(createOsc('square', freq*2, gainNode));
  } else if(instrument === 'strings'){
    list.push(createOsc('sawtooth', freq, gainNode));
    list.push(createOsc('triangle', freq/2, gainNode));
  }

  // simple decay
  gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);

  list.forEach(osc => osc.stop(audioContext.currentTime + duration));
}

// Build visual keys
const whiteKeysDiv = document.getElementById('whiteKeys');
const blackKeysContainer = document.getElementById('blackKeysContainer');
const whiteKeyElements = [];
const blackKeyElements = [];

whiteNotes.forEach((note, i) => {
  const w = document.createElement('div');
  w.className = 'key white';
  w.dataset.note = note;
  w.style.width = '80px';
  w.style.height = '240px';
  w.style.borderRadius = '6px';
  // label
  const label = document.createElement('div');
  label.className = 'key-label';
  label.textContent = note + ' (' + Object.keys(keyMap).find(k=>keyMap[k]===note)?.toUpperCase() + ')';
  w.appendChild(label);
  // click
  w.addEventListener('mousedown', () => {
    playSound(note, 0.6);
    w.classList.add('active');
    setTimeout(()=>w.classList.remove('active'), 200);
  });
  whiteKeysDiv.appendChild(w);
  whiteKeyElements.push(w);
});

// Position black keys absolutely over the white keys
// Calculate left positions relative to white keys
// Each white key is 80px wide + 2px gap (we used flex gap earlier). For simplicity use left offsets.
(function placeBlackKeys(){
  // container left offset is same as whiteKeysDiv start; we will compute positions using child bounding boxes
  // After layout, use bounding boxes to place black keys
  requestAnimationFrame(()=>{
    const whites = whiteKeyElements.map(el => el.getBoundingClientRect());
    const parentRect = whiteKeysDiv.getBoundingClientRect();
    blackNotes.forEach(b => {
      // positionIndex refers to between white keys: 0 means between white[0] and white[1]
      const idx = b.positionIndex;
      // compute mid point between white key idx and idx+1
      const leftWhite = whites[idx];
      const rightWhite = whites[idx+1];
      // some environments might not have rightWhite (be safe)
      const mid = rightWhite ? ((leftWhite.left + rightWhite.left) / 2) : (leftWhite.left + leftWhite.width * 0.75);
      // convert to container relative left
      const left = mid - parentRect.left;
      const bk = document.createElement('div');
      bk.className = 'key black';
      bk.dataset.note = b.note;
      bk.style.left = (left - 26) + 'px'; // center black key (width 52)
      bk.style.top = '10px';
      bk.textContent = b.note + ' (' + b.key.toUpperCase() + ')';
      bk.style.display = 'flex';
      bk.style.justifyContent = 'center';
      bk.style.alignItems = 'flex-end';
      bk.style.paddingBottom = '10px';
      bk.style.fontSize = '11px';
      bk.addEventListener('mousedown', () => {
        playSound(b.note, 0.6);
        bk.classList.add('active');
        setTimeout(()=>bk.classList.remove('active'), 200);
      });
      blackKeysContainer.appendChild(bk);
      blackKeyElements.push(bk);
    });
  });
})();

// Keyboard input handling
const keysDown = {};
window.addEventListener('keydown', (ev) => {
  const k = ev.key.toLowerCase();
  if(!keyMap[k]) return;
  if(keysDown[k]) return; // already pressed
  keysDown[k] = true;
  const note = keyMap[k];
  playSound(note, 0.6);
  // add visual active class to corresponding key element
  const white = document.querySelector('.key.white[data-note="'+note+'"]');
  const black = document.querySelector('.key.black[data-note="'+note+'"]');
  if(white) white.classList.add('active');
  if(black) black.classList.add('active');
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key.toLowerCase();
  if(!keyMap[k]) return;
  keysDown[k] = false;
  const note = keyMap[k];
  const white = document.querySelector('.key.white[data-note="'+note+'"]');
  const black = document.querySelector('.key.black[data-note="'+note+'"]');
  if(white) white.classList.remove('active');
  if(black) black.classList.remove('active');
});

// Prevent page scroll for space/arrow keys if used (safe)
window.addEventListener('keydown', function(e){
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
  }
});

// Small play/stop behavior: play a simple scale as demo
let demoTimer = null;
document.getElementById('playBtn').addEventListener('click', ()=>{
  clearInterval(demoTimer);
  const order = ['C4','D4','E4','F4','G4','A4','B4','C4'];
  let i = 0;
  demoTimer = setInterval(()=>{
    playSound(order[i%order.length], 0.5);
    // visual flash
    const el = document.querySelector('.key[data-note="'+order[i%order.length]+'"]');
    if(el){
      el.classList.add('active');
      setTimeout(()=>el.classList.remove('active'),200);
    }
    i++;
  }, 400);
});
document.getElementById('stopBtn').addEventListener('click', ()=>{
  clearInterval(demoTimer);
  demoTimer = null;
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  // no sequencer here; just stop demo
  clearInterval(demoTimer);
  demoTimer = null;
});
</script>
</body>
</html>
