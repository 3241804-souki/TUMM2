<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Piano — Two Octave Keyboard Mapping</title>
<link rel="icon" href="TUMM2.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4;padding:15px;color:#222}
.container{max-width:1000px;margin:auto}
header{text-align:center;margin-bottom:14px}
.logo{width:80px;height:80px;object-fit:cover;border-radius:12px;margin-bottom:8px}
.banner{width:100%;max-height:120px;object-fit:contain;border-radius:8px;margin-bottom:12px}
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
button,select{padding:8px 12px;border:none;border-radius:8px;cursor:pointer}
.play-btn{background:#4caf50;color:white}
.stop-btn{background:#f44336;color:white}
.clear-btn{background:#2196f3;color:white}
.control-box{background:white;padding:8px;border-radius:8px}
.piano-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative;user-select:none}
.white-keys{display:flex;gap:2px}
.key{display:flex;justify-content:center;align-items:flex-end;padding-bottom:10px;border:1px solid #333;font-size:12px;font-weight:bold;cursor:pointer}
.white{width:80px;height:220px;background:white;color:black;border-radius:6px;position:relative;z-index:1}
.black{width:52px;height:130px;background:black;color:white;position:absolute;z-index:2;border-radius:4px;box-shadow:0 4px 6px rgba(0,0,0,0.4)}
.key-label{font-size:12px;margin-bottom:8px;opacity:0.95;text-align:center}
.key.active{transform:translateY(4px);opacity:0.85}
.black.active{transform:translateY(6px)}
.keys-row{position:relative;padding:0 10px}
.info{text-align:center;margin-top:10px;font-size:14px}
.small{font-size:12px;color:#333}
</style>
</head>
<body>
<div class="container">
<header>
<img src="TUMM2.png" class="logo" alt="logo">
<img src="TUMM2.png" class="banner" alt="banner">
<h1>Piano — Two Octave Keyboard Mapping</h1>
<p class="small">Lower octave: Z X C V B N M (white) and S D G H J (black). Higher octave: Q W E R T Y U (white) and 2 3 5 6 7 9 (black).</p>
</header>

<div class="controls">
<button id="playBtn" class="play-btn">▶ Play</button>
<button id="stopBtn" class="stop-btn">■ Stop</button>
<button id="clearBtn" class="clear-btn">Clear</button>

<div class="control-box">
Volume
<input type="range" id="volume" min="0" max="100" value="50">
</div>

<div class="control-box">
Instrument
<select id="instrument">
<option value="piano">Piano</option>
<option value="electric">Electric Piano</option>
<option value="organ">Organ</option>
<option value="strings">Strings</option>
</select>
</div>
</div>

<div class="piano-wrap">
  <div class="keys-row">
    <div class="white-keys" id="whiteKeys"></div>
    <div id="blackKeysContainer"></div>
  </div>
</div>

<div class="info">
Press the mapped computer keys. Keys light while pressed. Sound lasts 0.6s.
</div>
</div>

<script>
// Note arrays and names
const whiteNames = ['C','D','E','F','G','A','B']; // pattern for one octave
const blackDefs = [
  {name:'C#', idx:0},
  {name:'D#', idx:1},
  {name:'F#', idx:3},
  {name:'G#', idx:4},
  {name:'A#', idx:5}
];

// Build noteNames and frequencies (C0..B8)
const noteNames = [];
(function buildNoteNames(){
  const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  for(let o=0;o<=8;o++){
    for(let i=0;i<12;i++){
      noteNames.push(names[i]+o);
    }
  }
})();

const frequencies = {};
(function buildFreq(){
  const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  for(let octave=0; octave<=8; octave++){
    for(let i=0;i<12;i++){
      const index = octave*12 + i;
      const a4Index = 4*12 + 9;
      frequencies[names[i]+octave] = 440 * Math.pow(2, (index - a4Index)/12);
    }
  }
})();

const audioContext = (window.AudioContext || window.webkitAudioContext) ? new (window.AudioContext || window.webkitAudioContext)() : null;

function createOsc(type,freq,gain){ const osc = audioContext.createOscillator(); osc.type=type; osc.frequency.value=freq; osc.connect(gain); osc.start(); return osc; }
function playSound(note, duration=0.6){
  if(!audioContext) return;
  const instrument = document.getElementById('instrument').value;
  const gain = audioContext.createGain();
  gain.gain.value = document.getElementById('volume').value/100;
  gain.connect(audioContext.destination);
  const list=[];
  const freq = frequencies[note] || 440;
  if(instrument==='piano') list.push(createOsc('sine',freq,gain));
  if(instrument==='electric') list.push(createOsc('triangle',freq,gain));
  if(instrument==='organ'){ list.push(createOsc('square',freq,gain)); list.push(createOsc('square',freq*2,gain)); }
  if(instrument==='strings'){ list.push(createOsc('sawtooth',freq,gain)); list.push(createOsc('triangle',freq/2,gain)); }
  gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
  list.forEach(o => o.stop(audioContext.currentTime + duration));
}

// Visual white keys represent C4..B4 by default (central octave)
let visualOctave = 4; // shows C4..B4

const whiteKeysDiv = document.getElementById('whiteKeys');
const blackKeysContainer = document.getElementById('blackKeysContainer');

function makeNote(name, octave){ return name + octave; }

function renderVisualKeys(){
  whiteKeysDiv.innerHTML = '';
  blackKeysContainer.innerHTML = '';
  // create white keys C..B with labels showing both octaves mapping
  for(let i=0;i<whiteNames.length;i++){
    const note = makeNote(whiteNames[i], visualOctave);
    const key = document.createElement('div');
    key.className = 'key white';
    key.dataset.note = note;
    key.style.width='80px';
    key.style.height='220px';
    const label = document.createElement('div');
    label.className = 'key-label';
    // label shows note and both keyboard mappings for clarity
    label.innerHTML = note;
    key.appendChild(label);
    key.addEventListener('mousedown', ()=>{
      playSound(note,0.6);
      key.classList.add('active');
      setTimeout(()=>key.classList.remove('active'),200);
    });
    whiteKeysDiv.appendChild(key);
  }

  // position black keys between whites
  requestAnimationFrame(()=>{
    const whites = Array.from(whiteKeysDiv.children);
    const parentRect = whiteKeysDiv.getBoundingClientRect();
    blackDefs.forEach(b=>{
      const leftWhite = whites[b.idx];
      const rightWhite = whites[b.idx+1];
      if(!leftWhite || !rightWhite) return;
      const leftRect = leftWhite.getBoundingClientRect();
      const rightRect = rightWhite.getBoundingClientRect();
      const mid = (leftRect.left + rightRect.left)/2;
      const left = mid - parentRect.left;
      const note = makeNote(b.name, visualOctave);
      const bk = document.createElement('div');
      bk.className = 'key black';
      bk.dataset.note = note;
      bk.style.left = (left - 26) + 'px';
      bk.style.top = '10px';
      bk.textContent = note;
      bk.style.display='flex';
      bk.style.justifyContent='center';
      bk.style.alignItems='flex-end';
      bk.style.paddingBottom='10px';
      bk.style.fontSize='11px';
      bk.addEventListener('mousedown', ()=>{
        playSound(note, 0.6);
        bk.classList.add('active');
        setTimeout(()=>bk.classList.remove('active'),200);
      });
      blackKeysContainer.appendChild(bk);
    });
  });
}
renderVisualKeys();

// Keyboard mapping definitions
// Lower octave (C3..B3):
// Whites: Z X C V B N M => C3 D3 E3 F3 G3 A3 B3
// Blacks: S D G H J => C#3 D#3 F#3 G#3 A#3
// Higher octave (C4..B4):
// Whites: Q W E R T Y U => C4 D4 E4 F4 G4 A4 B4
// Blacks: 2 3 5 6 7 9 => C#4 D#4 F#4 G#4 A#4

const keyToNote = {
  // lower octave
  'z':'C3','s':'C#3','x':'D3','d':'D#3','c':'E3','v':'F3','g':'F#3','b':'G3','h':'G#3','n':'A3','j':'A#3','m':'B3',
  // higher octave
  'q':'C4','2':'C#4','w':'D4','3':'D#4','e':'E4','r':'F4','5':'F#4','t':'G4','6':'G#4','y':'A4','7':'A#4','u':'B4'
};

// Track keys down to prevent repeats
const keysDown = {};

function keyVisual(note){
  // try to find exact note in visuals (visualOctave). If not found, use nearest
  let el = document.querySelector('.key[data-note="'+note+'"]');
  if(el) return el;
  // maybe note is from another octave; try to match name only
  const nameOnly = note.replace(/\d$/, '');
  el = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.note && k.dataset.note.startsWith(nameOnly));
  return el;
}

window.addEventListener('keydown', (ev)=>{
  const k = ev.key.toLowerCase();
  if(!keyToNote[k]) return;
  if(keysDown[k]) return;
  keysDown[k] = true;
  const note = keyToNote[k];
  playSound(note, 0.6);
  const el = keyVisual(note);
  if(el) el.classList.add('active');
});
window.addEventListener('keyup', (ev)=>{
  const k = ev.key.toLowerCase();
  if(!keyToNote[k]) return;
  keysDown[k] = false;
  const note = keyToNote[k];
  const el = keyVisual(note);
  if(el) el.classList.remove('active');
});

// Prevent page scrolling for space/arrows
window.addEventListener('keydown', function(e){
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
  }
});

// Demo play: plays C4..C5 scale using the higher octave notes if available
let demoTimer = null;
document.getElementById('playBtn').addEventListener('click', ()=>{
  clearInterval(demoTimer);
  const order = ['C4','D4','E4','F4','G4','A4','B4','C5'];
  let i=0;
  demoTimer = setInterval(()=>{
    const n = order[i % order.length];
    playSound(n, 0.5);
    const el = keyVisual(n);
    if(el){ el.classList.add('active'); setTimeout(()=>el.classList.remove('active'),200); }
    i++;
  }, 400);
});
document.getElementById('stopBtn').addEventListener('click', ()=>{
  clearInterval(demoTimer); demoTimer=null;
});
document.getElementById('clearBtn').addEventListener('click', ()=>{ clearInterval(demoTimer); demoTimer=null; });

</script>
</body>
</html>
