<div class="control-box"> Volume <input type="range" id="volume" min="0" max="100" value="50"> </div>
<div class="control-box"> BPM <input type="number" id="bpm" value="120" min="40" max="300"> </div>
<div class="control-box"> Instrument
  <select id="instrument">
    <option value="piano">Piano</option>
    <option value="electric">Electric Piano</option>
    <option value="organ">Organ</option>
    <option value="strings">Strings</option>
  </select>
</div>
